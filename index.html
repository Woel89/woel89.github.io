<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetGameForge — Каталог больших WebGL игр</title>
    <style>
        body { background-color: #121214; color: #f0f0f5; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        header { padding: 40px 20px; border-bottom: 1px solid #232329; }
        h1 { color: #00ff88; font-size: 2.5rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #9a9aab; font-size: 1.1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .card { background: #1a1a1e; border: 1px solid #2a2a32; border-radius: 12px; padding: 20px; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-5px); border-color: #00ff88; box-shadow: 0 5px 15px rgba(0,255,136,0.1); }
        .card-img { width: 100%; height: 160px; background: #25252b; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #555; font-weight: bold; }
        .card h3 { margin: 15px 0 5px 0; color: #fff; }
    </style>
</head>
<body>

    <header>
        <h1>NetGameForge</h1>
        <p>Портал мощных браузерных и WebGL игр. Запуск в один клик без скачивания.</p>
    </header>

    <main class="grid">
        <!-- Это карточки-заглушки для ваших будущих игр -->
        <div class="card">
            <div class="card-img">ЗДЕСЬ БУДЕТ ОБЛОЖКА</div>
            <h3>Моя первая игра</h3>
            <p>Жанр: Экшен / 3D</p>
        </div>
        <div class="card">
            <div class="card-img">ЗДЕСЬ БУДЕТ ОБЛОЖКА</div>
            <h3>Вторая игра</h3>
            <p>Жанр: Стратегия</p>
        </div>
    </main>

</body>
</html>
